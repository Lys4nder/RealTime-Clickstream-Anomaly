services:
  # 1. Messaging Layer: Zookeeper & Kafka
  zookeeper:
    image: wurstmeister/zookeeper
    container_name: zookeeper
    ports:
      - "2181:2181"
    networks:
      - app-tier
  kafka:
    image: wurstmeister/kafka
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      # Connect to Zookeeper
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      
      # "clickstream_events" with 1 partition and 1 replica
      KAFKA_CREATE_TOPICS: "clickstream_events:1:1"
      
      # network endpoints
      KAFKA_LISTENERS: INSIDE://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INSIDE://kafka:29092,OUTSIDE://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INSIDE
    volumes:
      # Mounting the docker socket
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistence
      - kafka_data:/kafka
    networks:
      - app-tier

# 2. Storage Layer: MinIO 

  minio:
    image: minio/minio:latest
    hostname: minio
    container_name: minio
    ports:
      - "9010:9000"   # API Port
      - "9001:9001"   # Console Port
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ./minio_data:/data
    networks:
      - app-tier


# 3. Processing Engine: Spark Master & Worker
  spark-master:
    build:
      context: ./pipelines
      dockerfile: Dockerfile
    image: my-spark-cluster  
    hostname: spark-master
    container_name: spark-master
    user: root
    ports:
      - "8080:8080"
      - "7077:7077"
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
    command: "/opt/spark/bin/spark-class org.apache.spark.deploy.master.Master"
    networks:
      - app-tier

  spark-worker:
    image: my-spark-cluster
    container_name: spark-worker
    depends_on:
      - spark-master
    user: root
    environment:
      - SPARK_WORKER_WEBUI_PORT=8081
      - SPARK_WORKER_CORES=1
      - SPARK_WORKER_MEMORY=1G
      - SPARK_MASTER=spark://spark-master:7077
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
      - AWS_S3_ENDPOINT=http://minio:9000
      - AWS_S3_PATH_STYLE=true
    command: "/opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077"
    networks:
      - app-tier

  batch-job:
    image: my-spark-cluster
    container_name: batch-job
    depends_on:
      - minio
      - minio-init
      - spark-master
      - spark-worker
    environment:
      - AWS_S3_ENDPOINT=http://minio:9000
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
      - AWS_S3_PATH_STYLE=true
      
      - SPARK_MASTER=spark://spark-master:7077
      # Networking for Client Mode (Driver <-> Worker)
      - SPARK_DRIVER_HOST=batch-job
      - SPARK_DRIVER_BIND_ADDRESS=0.0.0.0
    volumes:
      - ./pipelines/src:/app/src
    command: python3 /app/src/ingest_pipeline_batch/batch_processing.py
    networks:
      - app-tier

# 4. Producer: Clickstream Events Producer
  clickstream-producer:
    build: 
      context: ./data_producers/clickstream_events
      dockerfile: Dockerfile
    
    depends_on:
      - kafka
    
    # Connection details
    environment:
      - KAFKA_BROKER=kafka:29092
      - KAFKA_TOPIC=clickstream_events
      - NUM_THREADS=1
      - RUST_LOG=info
      - MAX_EVENTS=1000


# 5. Init Job: Create MinIO Buckets automatically

  minio-init:
    image: minio/mc
    container_name: minio-init
    depends_on:
      - minio
    volumes:
      - ./setup/init_minio.sh:/usr/bin/init_minio.sh:ro
      - ./setup/upload_parquet_to_bucket.sh:/usr/bin/upload_parquet_to_bucket.sh:ro
      - ./data_producers/orders_transaction_history/Orders_Transaction_History.parquet:/tmp/Orders_Transaction_History.parquet:ro
    entrypoint: /bin/sh
    command: -c "sh /usr/bin/init_minio.sh && sh /usr/bin/upload_parquet_to_bucket.sh /tmp/Orders_Transaction_History.parquet parquet-uploads Orders_Transaction_History.parquet"
    networks:
      - app-tier

# 6. Frontend: Clickstream Dashboard
  clickstream-frontend:
    build:
      context: ./clickstream-frontend
      dockerfile: Dockerfile
    container_name: clickstream-frontend
    ports:
      - "4200:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - app-tier


# 6. Backend
  backend-api:
    build:
      context: ./backend      
      dockerfile: Dockerfile
    container_name: backend-api
    ports:
      - "8000:8000"
    environment:
      - AWS_S3_ENDPOINT=http://minio:9000
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
    volumes:
      - ./backend:/app
    depends_on:
      - minio
    networks:
      - app-tier

networks:
  app-tier:
    driver: bridge

volumes:
  minio_data:
  kafka_data: